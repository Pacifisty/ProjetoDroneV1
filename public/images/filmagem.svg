<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Sky/landscape suggestion -->
  <rect x="0" y="280" width="800" height="120" fill="#0f172a" opacity="0.6"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="180" fill="#3b82f6" opacity="0.08"/>
  <circle cx="150" cy="320" r="140" fill="#06b6d4" opacity="0.08"/>
  <!-- Drone body (stable/level) -->
  <rect x="358" y="183" width="84" height="34" rx="10" fill="url(#accent)" opacity="0.9"/>
  <!-- Arms -->
  <line x1="362" y1="192" x2="285" y2="152" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="438" y1="192" x2="515" y2="152" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="362" y1="210" x2="285" y2="250" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="438" y1="210" x2="515" y2="250" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- Motors -->
  <circle cx="280" cy="147" r="22" fill="#06b6d4" opacity="0.85"/>
  <circle cx="520" cy="147" r="22" fill="#06b6d4" opacity="0.85"/>
  <circle cx="280" cy="255" r="22" fill="#06b6d4" opacity="0.85"/>
  <circle cx="520" cy="255" r="22" fill="#06b6d4" opacity="0.85"/>
  <!-- Propellers -->
  <ellipse cx="280" cy="147" rx="45" ry="6" fill="#3b82f6" opacity="0.55"/>
  <ellipse cx="520" cy="147" rx="45" ry="6" fill="#3b82f6" opacity="0.55"/>
  <ellipse cx="280" cy="255" rx="45" ry="6" fill="#3b82f6" opacity="0.55"/>
  <ellipse cx="520" cy="255" rx="45" ry="6" fill="#3b82f6" opacity="0.55"/>
  <!-- Camera gimbal -->
  <rect x="385" y="217" width="30" height="26" rx="5" fill="#0f172a" stroke="#06b6d4" stroke-width="2" opacity="0.95"/>
  <circle cx="400" cy="230" r="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="400" cy="230" r="3" fill="#06b6d4" opacity="0.8"/>
  <!-- Gimbal arm -->
  <line x1="400" y1="217" x2="400" y2="210" stroke="#06b6d4" stroke-width="3" opacity="0.7"/>
  <!-- Text -->
  <text x="400" y="315" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">Filmagem</text>
  <text x="400" y="345" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Cinematográfico · Gimbal · GPS</text>
</svg>
