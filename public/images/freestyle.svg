<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="180" fill="#a855f7" opacity="0.08"/>
  <circle cx="150" cy="320" r="140" fill="#ec4899" opacity="0.08"/>
  <!-- Acrobatic trail -->
  <path d="M 150 200 Q 280 100 400 200 Q 520 300 650 180" stroke="#a855f7" stroke-width="2.5" fill="none" opacity="0.35" stroke-dasharray="10,6"/>
  <!-- Drone body (tilted for acrobatic feel) -->
  <g transform="rotate(-20, 400, 200)">
    <rect x="360" y="185" width="80" height="30" rx="8" fill="url(#accent)" opacity="0.9"/>
    <!-- Arms -->
    <line x1="363" y1="192" x2="293" y2="155" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <line x1="437" y1="192" x2="507" y2="155" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <line x1="363" y1="213" x2="293" y2="250" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <line x1="437" y1="213" x2="507" y2="250" stroke="#a855f7" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <!-- Motors -->
    <circle cx="288" cy="150" r="22" fill="#ec4899" opacity="0.85"/>
    <circle cx="512" cy="150" r="22" fill="#ec4899" opacity="0.85"/>
    <circle cx="288" cy="255" r="22" fill="#ec4899" opacity="0.85"/>
    <circle cx="512" cy="255" r="22" fill="#ec4899" opacity="0.85"/>
    <!-- Propellers -->
    <ellipse cx="288" cy="150" rx="44" ry="6" fill="#a855f7" opacity="0.6" transform="rotate(-25, 288, 150)"/>
    <ellipse cx="512" cy="150" rx="44" ry="6" fill="#a855f7" opacity="0.6" transform="rotate(25, 512, 150)"/>
    <ellipse cx="288" cy="255" rx="44" ry="6" fill="#a855f7" opacity="0.6" transform="rotate(25, 288, 255)"/>
    <ellipse cx="512" cy="255" rx="44" ry="6" fill="#a855f7" opacity="0.6" transform="rotate(-25, 512, 255)"/>
  </g>
  <!-- Text -->
  <text x="400" y="315" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">Freestyle</text>
  <text x="400" y="345" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Acrobacias · Alta potência · Criatividade</text>
</svg>
