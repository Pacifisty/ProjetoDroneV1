<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="180" fill="#ef4444" opacity="0.08"/>
  <circle cx="150" cy="320" r="140" fill="#f43f5e" opacity="0.08"/>
  <!-- Range signal circles -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,5"/>
  <circle cx="400" cy="200" r="130" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.15" stroke-dasharray="6,5"/>
  <circle cx="400" cy="200" r="175" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.1" stroke-dasharray="6,5"/>
  <!-- GPS antenna lines -->
  <line x1="400" y1="165" x2="400" y2="135" stroke="#f43f5e" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="400" y1="135" x2="385" y2="118" stroke="#f43f5e" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <line x1="400" y1="135" x2="415" y2="118" stroke="#f43f5e" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  <!-- Drone body -->
  <rect x="362" y="183" width="76" height="34" rx="9" fill="url(#accent)" opacity="0.9"/>
  <!-- Arms -->
  <line x1="365" y1="192" x2="292" y2="152" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="435" y1="192" x2="508" y2="152" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="365" y1="210" x2="292" y2="250" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="435" y1="210" x2="508" y2="250" stroke="#ef4444" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <!-- Motors -->
  <circle cx="287" cy="147" r="22" fill="#f43f5e" opacity="0.85"/>
  <circle cx="513" cy="147" r="22" fill="#f43f5e" opacity="0.85"/>
  <circle cx="287" cy="255" r="22" fill="#f43f5e" opacity="0.85"/>
  <circle cx="513" cy="255" r="22" fill="#f43f5e" opacity="0.85"/>
  <!-- Propellers -->
  <ellipse cx="287" cy="147" rx="46" ry="6" fill="#ef4444" opacity="0.55"/>
  <ellipse cx="513" cy="147" rx="46" ry="6" fill="#ef4444" opacity="0.55"/>
  <ellipse cx="287" cy="255" rx="46" ry="6" fill="#ef4444" opacity="0.55"/>
  <ellipse cx="513" cy="255" rx="46" ry="6" fill="#ef4444" opacity="0.55"/>
  <!-- GPS dot -->
  <circle cx="400" cy="118" r="5" fill="#f43f5e" opacity="0.9"/>
  <!-- Text -->
  <text x="400" y="315" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">Long Range</text>
  <text x="400" y="345" font-family="sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">Longo alcance · Alta autonomia · GPS avançado</text>
</svg>
